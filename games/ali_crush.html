<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Crush</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0D0D1A; --panel:#141428; --cyan:#00FFFF; --pink:#FF006E; --purple:#7C3AED; --muted:#8a8aa8; --gold:#FFD700; }
  *{box-sizing:border-box;}
  body { margin:0; background:var(--bg); color:#fff; font-family:'Chakra Petch',sans-serif;
         min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px;
         background-image: radial-gradient(circle at 30% 20%, rgba(255,0,110,0.08), transparent 50%); }
  h1 { font-family:'Russo One',sans-serif; color:var(--pink); font-size:2.2rem;
       text-shadow:0 0 20px rgba(255,0,110,0.6); margin:8px 0 4px; letter-spacing:2px; }
  .sub { color:var(--muted); font-size:0.9rem; margin-bottom:14px; }
  .hud { display:flex; gap:24px; margin-bottom:10px; font-weight:700; font-size:1rem; }
  .hud b { color:var(--cyan); }
  canvas { background:var(--panel); border:2px solid var(--pink); border-radius:10px;
           box-shadow:0 0 30px rgba(255,0,110,0.25); max-width:100%; touch-action:none; cursor:pointer; }
  .btn { font-family:'Russo One',sans-serif; background:linear-gradient(135deg,var(--pink),var(--purple));
         border:none; color:#fff; padding:10px 26px; border-radius:8px; font-size:1rem;
         letter-spacing:1px; cursor:pointer; box-shadow:0 0 15px rgba(255,0,110,0.3); margin-top:14px; }
  .back { position:fixed; top:12px; left:12px; background:var(--panel); border:1px solid var(--cyan);
          color:var(--cyan); padding:6px 12px; border-radius:6px; text-decoration:none;
          font-family:'Russo One',sans-serif; font-size:0.85rem; }
  .tip { color:var(--muted); font-size:0.78rem; margin-top:10px; text-align:center; max-width:520px; }
</style>
</head>
<body>
<a href="../" class="back">← BACK</a>
<h1>ALI CRUSH</h1>
<div class="sub">Swap adjacent Alis to make 3+ in a row.</div>
<div class="hud">
  <span>SCORE: <b id="score">0</b></span>
  <span>MOVES: <b id="moves">25</b></span>
  <span>TARGET: <b id="target">2000</b></span>
</div>
<canvas id="c" width="480" height="480"></canvas>
<button class="btn" id="start">NEW GAME</button>
<div class="tip">Click + click adjacent (or drag) to swap &bull; Match 3+ Alis of same color &bull; Reach the score before moves run out</div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var aliImg = new Image();
  aliImg.src = '../ali.jpg';

  var GRID = 8;
  var CELL = W / GRID;
  var COLORS = ['#00FFFF','#FF006E','#FFD700','#2ecc71','#9b59b6','#FB8C00'];

  var grid = []; // grid[y][x] = colorIndex or -1 for empty
  var animations = []; // {x,y,fromY,toY,t,dur,color} for falling
  var sparks = [];
  var score = 0, moves = 25, target = 2000;
  var running = false, gameOver = false;
  var selected = null;
  var swapping = null; // {x1,y1,x2,y2,t,dur}
  var resolving = false;

  function init() {
    grid = [];
    for (var y = 0; y < GRID; y++) {
      grid[y] = [];
      for (var x = 0; x < GRID; x++) {
        // Avoid initial 3-matches
        var c;
        do {
          c = Math.floor(Math.random() * COLORS.length);
        } while (
          (x >= 2 && grid[y][x-1] === c && grid[y][x-2] === c) ||
          (y >= 2 && grid[y-1][x] === c && grid[y-2][x] === c)
        );
        grid[y][x] = c;
      }
    }
    score = 0; moves = 25; selected = null; swapping = null; resolving = false;
    gameOver = false; running = true; animations = []; sparks = [];
    updateHUD();
  }

  function updateHUD() {
    document.getElementById('score').textContent = score;
    document.getElementById('moves').textContent = moves;
    document.getElementById('target').textContent = target;
  }

  function adjacent(x1, y1, x2, y2) {
    return (Math.abs(x1-x2) === 1 && y1 === y2) || (Math.abs(y1-y2) === 1 && x1 === x2);
  }

  function swap(x1, y1, x2, y2) {
    var t = grid[y1][x1];
    grid[y1][x1] = grid[y2][x2];
    grid[y2][x2] = t;
  }

  function findMatches() {
    var matched = {};
    // Horizontal
    for (var y = 0; y < GRID; y++) {
      var run = 1;
      for (var x = 1; x <= GRID; x++) {
        if (x < GRID && grid[y][x] !== -1 && grid[y][x] === grid[y][x-1]) {
          run++;
        } else {
          if (run >= 3) {
            for (var k = 0; k < run; k++) matched[(x-1-k) + ',' + y] = true;
          }
          run = 1;
        }
      }
    }
    // Vertical
    for (var x2 = 0; x2 < GRID; x2++) {
      var run2 = 1;
      for (var y2 = 1; y2 <= GRID; y2++) {
        if (y2 < GRID && grid[y2][x2] !== -1 && grid[y2][x2] === grid[y2-1][x2]) {
          run2++;
        } else {
          if (run2 >= 3) {
            for (var k2 = 0; k2 < run2; k2++) matched[x2 + ',' + (y2-1-k2)] = true;
          }
          run2 = 1;
        }
      }
    }
    return matched;
  }

  function clearMatched(matched) {
    var count = 0;
    for (var key in matched) {
      var p = key.split(',');
      var x = parseInt(p[0], 10), y = parseInt(p[1], 10);
      var color = COLORS[grid[y][x]] || '#fff';
      grid[y][x] = -1;
      count++;
      // Sparks
      for (var i = 0; i < 8; i++) {
        sparks.push({ x: x*CELL+CELL/2, y: y*CELL+CELL/2,
          vx: (Math.random()-0.5)*220, vy: (Math.random()-0.5)*220 - 60,
          life:0.5, maxLife:0.5, color: color });
      }
    }
    return count;
  }

  function applyGravity() {
    var moved = false;
    for (var x = 0; x < GRID; x++) {
      for (var y = GRID - 1; y >= 0; y--) {
        if (grid[y][x] === -1) {
          // Find first non-empty above
          for (var ty = y - 1; ty >= 0; ty--) {
            if (grid[ty][x] !== -1) {
              grid[y][x] = grid[ty][x];
              grid[ty][x] = -1;
              animations.push({ x: x, y: y, fromY: ty, toY: y, t: 0, dur: 0.18 });
              moved = true;
              break;
            }
          }
        }
      }
    }
    return moved;
  }

  function refill() {
    var added = false;
    for (var x = 0; x < GRID; x++) {
      for (var y = 0; y < GRID; y++) {
        if (grid[y][x] === -1) {
          grid[y][x] = Math.floor(Math.random() * COLORS.length);
          animations.push({ x: x, y: y, fromY: y - GRID, toY: y, t: 0, dur: 0.25 });
          added = true;
        }
      }
    }
    return added;
  }

  function resolveStep() {
    var matched = findMatches();
    var keys = Object.keys(matched);
    if (keys.length === 0) {
      resolving = false;
      // Game over check
      if (moves <= 0 || score >= target) endGame();
      return;
    }
    var n = clearMatched(matched);
    score += n * 10 * (n > 3 ? 2 : 1);
    updateHUD();
    setTimeout(function(){
      applyGravity();
      refill();
      // Wait for animations to finish before next resolve step
      setTimeout(resolveStep, 280);
    }, 250);
  }

  function endGame() {
    running = false;
    gameOver = true;
    document.getElementById('start').textContent = score >= target ? 'WIN! NEW LEVEL' : 'TRY AGAIN';
    if (score >= target) target = Math.floor(target * 1.4);
  }

  // Input
  var dragStart = null;
  function onDown(mx, my) {
    if (resolving || swapping || gameOver) return;
    var x = Math.floor(mx / CELL), y = Math.floor(my / CELL);
    if (x < 0 || y < 0 || x >= GRID || y >= GRID) return;
    if (selected) {
      if (adjacent(selected.x, selected.y, x, y)) {
        attemptSwap(selected.x, selected.y, x, y);
      }
      selected = null;
    } else {
      selected = { x: x, y: y };
      dragStart = { x: mx, y: my, gx: x, gy: y };
    }
  }
  function onMove(mx, my) {
    if (!dragStart || swapping || resolving) return;
    var dx = mx - dragStart.x, dy = my - dragStart.y;
    if (Math.abs(dx) < CELL * 0.4 && Math.abs(dy) < CELL * 0.4) return;
    var ddx = 0, ddy = 0;
    if (Math.abs(dx) > Math.abs(dy)) ddx = dx > 0 ? 1 : -1;
    else ddy = dy > 0 ? 1 : -1;
    var nx = dragStart.gx + ddx, ny = dragStart.gy + ddy;
    if (nx < 0 || ny < 0 || nx >= GRID || ny >= GRID) { dragStart = null; selected = null; return; }
    attemptSwap(dragStart.gx, dragStart.gy, nx, ny);
    dragStart = null;
    selected = null;
  }
  function attemptSwap(x1, y1, x2, y2) {
    if (resolving) return;
    swap(x1, y1, x2, y2);
    var matched = findMatches();
    if (Object.keys(matched).length === 0) {
      // Invalid swap — undo
      swap(x1, y1, x2, y2);
      // visual nudge
      sparks.push({ x: ((x1+x2)/2)*CELL+CELL/2, y: ((y1+y2)/2)*CELL+CELL/2,
        vx: 0, vy: 0, life:0.3, maxLife:0.3, color:'#FF4444' });
      return;
    }
    moves--;
    updateHUD();
    resolving = true;
    setTimeout(resolveStep, 100);
  }

  canvas.addEventListener('mousedown', function(e){
    var r = canvas.getBoundingClientRect();
    onDown((e.clientX - r.left) * (W/r.width), (e.clientY - r.top) * (H/r.height));
  });
  canvas.addEventListener('mousemove', function(e){
    var r = canvas.getBoundingClientRect();
    onMove((e.clientX - r.left) * (W/r.width), (e.clientY - r.top) * (H/r.height));
  });
  canvas.addEventListener('mouseup', function(){ dragStart = null; });
  canvas.addEventListener('touchstart', function(e){
    var r = canvas.getBoundingClientRect();
    onDown((e.touches[0].clientX - r.left) * (W/r.width), (e.touches[0].clientY - r.top) * (H/r.height));
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchmove', function(e){
    var r = canvas.getBoundingClientRect();
    onMove((e.touches[0].clientX - r.left) * (W/r.width), (e.touches[0].clientY - r.top) * (H/r.height));
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', function(){ dragStart = null; });

  // Render
  function drawCell(x, y, color, scale, dropY) {
    var px = x * CELL + CELL/2;
    var py = (dropY != null ? dropY : y) * CELL + CELL/2;
    var r = CELL * 0.42 * (scale != null ? scale : 1);
    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    if (aliImg.complete && aliImg.naturalWidth) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(px, py, r - 2, 0, Math.PI*2);
      ctx.clip();
      ctx.drawImage(aliImg, px - r, py - r, r*2, r*2);
      ctx.restore();
    }
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function update(dt) {
    // Anim
    for (var i = animations.length - 1; i >= 0; i--) {
      animations[i].t += dt;
      if (animations[i].t >= animations[i].dur) animations.splice(i, 1);
    }
    for (var j = sparks.length - 1; j >= 0; j--) {
      var p = sparks[j];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 600 * dt;
      p.life -= dt;
      if (p.life <= 0) sparks.splice(j, 1);
    }
  }

  function draw() {
    ctx.fillStyle = '#0D0D1A';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    for (var i = 0; i <= GRID; i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(W, i*CELL); ctx.stroke();
    }
    // Cells (use animation drop offset)
    for (var y = 0; y < GRID; y++) {
      for (var x = 0; x < GRID; x++) {
        if (grid[y][x] === -1) continue;
        var color = COLORS[grid[y][x]];
        // Find anim for this cell
        var anim = null;
        for (var a = 0; a < animations.length; a++) {
          if (animations[a].x === x && animations[a].y === y) { anim = animations[a]; break; }
        }
        if (anim) {
          var p = Math.min(1, anim.t / anim.dur);
          // ease out
          p = 1 - Math.pow(1 - p, 2);
          var dropY = anim.fromY + (anim.toY - anim.fromY) * p;
          drawCell(x, y, color, 1, dropY);
        } else {
          drawCell(x, y, color, 1);
        }
      }
    }
    // Selected highlight
    if (selected) {
      ctx.save();
      ctx.shadowColor = '#FFFFFF'; ctx.shadowBlur = 20;
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 3;
      ctx.strokeRect(selected.x*CELL+3, selected.y*CELL+3, CELL-6, CELL-6);
      ctx.restore();
    }
    // Sparks
    for (var k = 0; k < sparks.length; k++) {
      var sp = sparks[k];
      ctx.globalAlpha = Math.max(0, sp.life / sp.maxLife);
      ctx.fillStyle = sp.color;
      ctx.fillRect(sp.x - 2, sp.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = score >= target ? '#2ecc71' : '#FF006E';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 20;
      ctx.font = "bold 30px 'Russo One', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText(score >= target ? 'YOU WIN!' : 'OUT OF MOVES', W/2, H/2 - 10);
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 0;
      ctx.font = "bold 18px 'Russo One', sans-serif";
      ctx.fillText('Score: ' + score, W/2, H/2 + 22);
    }
  }

  var lastTime = 0;
  function loop(t) {
    var dt = Math.min(0.033, (t - lastTime) / 1000) || 0;
    lastTime = t;
    if (running) update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('start').addEventListener('click', function(){
    init();
    document.getElementById('start').textContent = 'RESET';
  });

  init();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
