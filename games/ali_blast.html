<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Blast</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0D0D1A; --panel:#141428; --cyan:#00FFFF; --pink:#FF006E; --purple:#7C3AED; --muted:#8a8aa8; }
  *{box-sizing:border-box;}
  body { margin:0; background:#000; color:#fff; font-family:'Chakra Petch',sans-serif;
         min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }
  h1 { font-family:'Russo One',sans-serif; color:var(--pink); font-size:2.2rem;
       text-shadow:0 0 20px rgba(255,0,110,0.6); margin:8px 0 4px; letter-spacing:2px; }
  .sub { color:var(--muted); font-size:0.9rem; margin-bottom:14px; text-align:center; }
  .hud { display:flex; gap:24px; margin-bottom:10px; font-weight:700; font-size:1rem; }
  .hud b { color:var(--cyan); }
  canvas { background:#000; border:2px solid var(--pink); border-radius:10px;
           box-shadow:0 0 30px rgba(255,0,110,0.25); max-width:100%; touch-action:none; }
  .btn { font-family:'Russo One',sans-serif; background:linear-gradient(135deg,var(--pink),var(--purple));
         border:none; color:#fff; padding:10px 26px; border-radius:8px; font-size:1rem;
         letter-spacing:1px; cursor:pointer; box-shadow:0 0 15px rgba(255,0,110,0.3); margin-top:14px; }
  .back { position:fixed; top:12px; left:12px; background:var(--panel); border:1px solid var(--cyan);
          color:var(--cyan); padding:6px 12px; border-radius:6px; text-decoration:none;
          font-family:'Russo One',sans-serif; font-size:0.85rem; }
  .tip { color:var(--muted); font-size:0.78rem; margin-top:10px; text-align:center; max-width:520px; }
  .touch-pad { position:fixed; bottom:18px; display:none; gap:16px; z-index:5; }
  .touch-pad button { width:64px; height:64px; border-radius:50%; background:rgba(0,255,255,0.15);
                      border:2px solid var(--cyan); color:var(--cyan); font-size:1.4rem;
                      font-family:'Russo One',sans-serif; touch-action:manipulation; }
  @media (pointer: coarse) { .touch-pad { display:flex; } .touch-pad.left{left:18px;} .touch-pad.right{right:18px;} }
</style>
</head>
<body>
<a href="../" class="back">← BACK</a>
<h1>ALI BLAST</h1>
<div class="sub">Shoot the Ali asteroids. Don't crash. They split when hit.</div>
<div class="hud">
  <span>SCORE: <b id="score">0</b></span>
  <span>LIVES: <b id="lives">3</b></span>
  <span>WAVE: <b id="wave">1</b></span>
</div>
<canvas id="c" width="720" height="520"></canvas>
<button class="btn" id="start">PLAY</button>
<div class="tip">← → rotate &bull; ↑ or W thrust &bull; SPACE shoot &bull; H hyperspace</div>

<div class="touch-pad left" id="padLeft">
  <button data-k="ArrowLeft">◀</button>
  <button data-k="ArrowRight">▶</button>
</div>
<div class="touch-pad right" id="padRight">
  <button data-k="ArrowUp">▲</button>
  <button data-k=" ">●</button>
</div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var aliImg = new Image();
  aliImg.src = '../ali.jpg';

  var ship = { x: W/2, y: H/2, vx: 0, vy: 0, angle: -Math.PI/2, r: 14, invuln: 0 };
  var bullets = [];
  var asteroids = [];
  var particles = [];
  var stars = [];
  for (var i = 0; i < 80; i++) stars.push({x: Math.random()*W, y: Math.random()*H, s: Math.random()*1.5+0.5});

  var score = 0, lives = 3, wave = 1;
  var running = false, gameOver = false;
  var keys = {};
  var shootCooldown = 0;

  document.addEventListener('keydown', function(e){
    keys[e.key] = true;
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'w' || e.key === 'W' || e.key === 'H' || e.key === 'h') e.preventDefault();
  });
  document.addEventListener('keyup', function(e){ keys[e.key] = false; });

  // Touch pad
  ['padLeft','padRight'].forEach(function(id){
    document.getElementById(id).querySelectorAll('button').forEach(function(b){
      var k = b.dataset.k;
      b.addEventListener('touchstart', function(e){ keys[k] = true; e.preventDefault(); }, {passive:false});
      b.addEventListener('touchend',   function(e){ keys[k] = false; e.preventDefault(); }, {passive:false});
      b.addEventListener('mousedown',  function(){ keys[k] = true; });
      b.addEventListener('mouseup',    function(){ keys[k] = false; });
      b.addEventListener('mouseleave', function(){ keys[k] = false; });
    });
  });

  function spawnAsteroid(x, y, size) {
    var speed = 40 + wave * 6 + Math.random() * 40;
    var a = Math.random() * Math.PI * 2;
    asteroids.push({
      x: x, y: y, vx: Math.cos(a)*speed, vy: Math.sin(a)*speed,
      r: size === 3 ? 44 : (size === 2 ? 28 : 16),
      size: size,
      rot: Math.random()*Math.PI*2,
      vrot: (Math.random()-0.5) * 2
    });
  }

  function spawnWave(n) {
    for (var i = 0; i < n; i++) {
      var x, y;
      // Spawn away from ship
      do {
        x = Math.random() * W;
        y = Math.random() * H;
      } while (Math.hypot(x - ship.x, y - ship.y) < 140);
      spawnAsteroid(x, y, 3);
    }
  }

  function spawnParticles(x, y, color, n) {
    for (var i = 0; i < n; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random()-0.5)*300, vy: (Math.random()-0.5)*300,
        life: 0.5, maxLife: 0.5, color: color
      });
    }
  }

  function hyperspace() {
    ship.x = 20 + Math.random() * (W - 40);
    ship.y = 20 + Math.random() * (H - 40);
    ship.vx = 0; ship.vy = 0;
    ship.invuln = 1.0;
    spawnParticles(ship.x, ship.y, '#00FFFF', 20);
  }

  function updateHUD() {
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('wave').textContent = wave;
  }

  function wrap(o, r) {
    if (o.x < -r) o.x = W + r;
    if (o.x > W + r) o.x = -r;
    if (o.y < -r) o.y = H + r;
    if (o.y > H + r) o.y = -r;
  }

  function update(dt) {
    // Ship controls
    if (keys['ArrowLeft']) ship.angle -= 3.5 * dt;
    if (keys['ArrowRight']) ship.angle += 3.5 * dt;
    var thrusting = (keys['ArrowUp'] || keys['w'] || keys['W']);
    if (thrusting) {
      ship.vx += Math.cos(ship.angle) * 280 * dt;
      ship.vy += Math.sin(ship.angle) * 280 * dt;
      // Thrust particles
      if (Math.random() < 0.6) {
        particles.push({
          x: ship.x - Math.cos(ship.angle)*ship.r,
          y: ship.y - Math.sin(ship.angle)*ship.r,
          vx: -Math.cos(ship.angle) * 140 + (Math.random()-0.5)*80,
          vy: -Math.sin(ship.angle) * 140 + (Math.random()-0.5)*80,
          life: 0.35, maxLife: 0.35, color: '#FFB347'
        });
      }
    }
    // Drag
    ship.vx *= Math.pow(0.995, dt * 60);
    ship.vy *= Math.pow(0.995, dt * 60);
    // Cap speed
    var sp = Math.hypot(ship.vx, ship.vy);
    if (sp > 420) { ship.vx *= 420/sp; ship.vy *= 420/sp; }
    ship.x += ship.vx * dt;
    ship.y += ship.vy * dt;
    wrap(ship, ship.r);
    if (ship.invuln > 0) ship.invuln -= dt;

    // Hyperspace
    if ((keys['h'] || keys['H']) && ship.invuln <= 0) {
      hyperspace();
      keys['h'] = false; keys['H'] = false;
    }

    // Shoot
    shootCooldown -= dt;
    if (keys[' '] && shootCooldown <= 0 && bullets.length < 5) {
      bullets.push({
        x: ship.x + Math.cos(ship.angle)*ship.r,
        y: ship.y + Math.sin(ship.angle)*ship.r,
        vx: Math.cos(ship.angle)*540 + ship.vx*0.3,
        vy: Math.sin(ship.angle)*540 + ship.vy*0.3,
        life: 1.0
      });
      shootCooldown = 0.2;
    }

    // Bullets
    for (var i = bullets.length - 1; i >= 0; i--) {
      var b = bullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.life -= dt;
      wrap(b, 2);
      if (b.life <= 0) { bullets.splice(i, 1); continue; }
      // Collide with asteroids
      for (var j = asteroids.length - 1; j >= 0; j--) {
        var a = asteroids[j];
        if (Math.hypot(b.x - a.x, b.y - a.y) < a.r) {
          bullets.splice(i, 1);
          var pts = a.size === 3 ? 20 : (a.size === 2 ? 50 : 100);
          score += pts;
          spawnParticles(a.x, a.y, '#FF006E', 14);
          if (a.size > 1) {
            spawnAsteroid(a.x, a.y, a.size - 1);
            spawnAsteroid(a.x, a.y, a.size - 1);
          }
          asteroids.splice(j, 1);
          updateHUD();
          break;
        }
      }
    }

    // Asteroids move + collide with ship
    for (var k = 0; k < asteroids.length; k++) {
      var a2 = asteroids[k];
      a2.x += a2.vx * dt;
      a2.y += a2.vy * dt;
      a2.rot += a2.vrot * dt;
      wrap(a2, a2.r);
      if (ship.invuln <= 0 && Math.hypot(ship.x - a2.x, ship.y - a2.y) < ship.r + a2.r - 4) {
        lives--;
        ship.invuln = 2.0;
        ship.vx = 0; ship.vy = 0;
        spawnParticles(ship.x, ship.y, '#FF4444', 30);
        updateHUD();
        if (lives <= 0) { running = false; gameOver = true; document.getElementById('start').textContent = 'TRY AGAIN'; }
        break;
      }
    }

    // Particles
    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      pt.life -= dt;
      if (pt.life <= 0) particles.splice(p, 1);
    }

    // Next wave
    if (asteroids.length === 0 && running) {
      wave++;
      updateHUD();
      setTimeout(function(){ if (running) spawnWave(3 + wave); }, 600);
    }
  }

  function drawAsteroid(a) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    ctx.shadowColor = '#FF006E';
    ctx.shadowBlur = 8;
    // Craggy polygon border
    ctx.beginPath();
    var pts = 10;
    for (var i = 0; i < pts; i++) {
      var ang = (i / pts) * Math.PI * 2;
      var rd = a.r * (0.85 + 0.15 * Math.sin(i * 2.3));
      var px = Math.cos(ang) * rd, py = Math.sin(ang) * rd;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.strokeStyle = '#FF006E';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Ali face center
    if (aliImg.complete && aliImg.naturalWidth) {
      var fs = a.r * 1.3;
      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, fs/2, 0, Math.PI*2);
      ctx.clip();
      ctx.drawImage(aliImg, -fs/2, -fs/2, fs, fs);
      ctx.restore();
    }
    ctx.restore();
  }

  function drawShip() {
    if (ship.invuln > 0 && Math.floor(ship.invuln * 10) % 2 === 0) return; // blink
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(ship.angle);
    ctx.shadowColor = '#00FFFF';
    ctx.shadowBlur = 12;
    // Triangle ship
    ctx.beginPath();
    ctx.moveTo(ship.r, 0);
    ctx.lineTo(-ship.r, ship.r * 0.7);
    ctx.lineTo(-ship.r * 0.5, 0);
    ctx.lineTo(-ship.r, -ship.r * 0.7);
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,255,255,0.15)';
    ctx.fill();
    ctx.strokeStyle = '#00FFFF';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Ali face in cockpit
    if (aliImg.complete && aliImg.naturalWidth) {
      var fs = ship.r * 0.9;
      ctx.save();
      ctx.beginPath();
      ctx.arc(-ship.r * 0.15, 0, fs/2, 0, Math.PI*2);
      ctx.clip();
      ctx.drawImage(aliImg, -ship.r * 0.15 - fs/2, -fs/2, fs, fs);
      ctx.restore();
    }
    ctx.restore();
  }

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (var s = 0; s < stars.length; s++) {
      ctx.globalAlpha = stars[s].s / 2;
      ctx.fillRect(stars[s].x, stars[s].y, stars[s].s, stars[s].s);
    }
    ctx.globalAlpha = 1;

    // Asteroids
    for (var i = 0; i < asteroids.length; i++) drawAsteroid(asteroids[i]);

    // Bullets
    ctx.save();
    ctx.shadowColor = '#00FFFF';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#00FFFF';
    for (var j = 0; j < bullets.length; j++) {
      ctx.beginPath();
      ctx.arc(bullets[j].x, bullets[j].y, 2.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();

    // Particles
    for (var k = 0; k < particles.length; k++) {
      var p = particles[k];
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;

    drawShip();

    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#FF006E';
      ctx.shadowColor = '#FF006E';
      ctx.shadowBlur = 20;
      ctx.font = "bold 36px 'Russo One', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, H/2 - 10);
      ctx.fillStyle = '#00FFFF';
      ctx.shadowColor = '#00FFFF';
      ctx.font = "bold 20px 'Russo One', sans-serif";
      ctx.fillText('Score: ' + score + '   Wave: ' + wave, W/2, H/2 + 20);
      ctx.shadowBlur = 0;
    }
  }

  var lastTime = 0;
  function loop(t) {
    var dt = Math.min(0.033, (t - lastTime) / 1000) || 0;
    lastTime = t;
    if (running) update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function startGame() {
    score = 0; lives = 3; wave = 1;
    bullets = []; asteroids = []; particles = [];
    ship.x = W/2; ship.y = H/2; ship.vx = 0; ship.vy = 0; ship.angle = -Math.PI/2;
    ship.invuln = 1.5;
    gameOver = false; running = true;
    updateHUD();
    spawnWave(3 + wave);
  }

  document.getElementById('start').addEventListener('click', startGame);
  updateHUD();
  // Initial few asteroids for flavor
  for (var w = 0; w < 4; w++) spawnAsteroid(Math.random()*W, Math.random()*H, 3);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
