<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Pop</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0D0D1A; --panel:#141428; --cyan:#00FFFF; --pink:#FF006E; --purple:#7C3AED; --muted:#8a8aa8; }
  *{box-sizing:border-box;}
  body { margin:0; background:var(--bg); color:#fff; font-family:'Chakra Petch',sans-serif;
         min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px;
         background-image: radial-gradient(circle at 30% 30%, rgba(255,0,110,0.08), transparent 50%),
                           radial-gradient(circle at 70% 70%, rgba(0,255,255,0.08), transparent 50%); }
  h1 { font-family:'Russo One',sans-serif; color:var(--pink); font-size:2.2rem;
       text-shadow:0 0 20px rgba(255,0,110,0.6); margin:8px 0 4px; letter-spacing:2px; }
  .sub { color:var(--muted); font-size:0.9rem; margin-bottom:14px; }
  .hud { display:flex; gap:24px; margin-bottom:10px; font-weight:700; }
  .hud b { color:var(--cyan); }
  canvas { background:linear-gradient(180deg,#1a1a3a,#0D0D1A); border:2px solid var(--pink);
           border-radius:10px; box-shadow:0 0 30px rgba(255,0,110,0.3); max-width:100%; touch-action:none; }
  .btn { font-family:'Russo One',sans-serif; background:linear-gradient(135deg,var(--pink),var(--purple));
         border:none; color:#fff; padding:10px 26px; border-radius:8px; font-size:1rem;
         letter-spacing:1px; cursor:pointer; box-shadow:0 0 15px rgba(255,0,110,0.3); margin-top:14px; }
  .btn:hover { transform:translateY(-2px); }
  .back { position:fixed; top:12px; left:12px; background:var(--panel); border:1px solid var(--cyan);
          color:var(--cyan); padding:6px 12px; border-radius:6px; text-decoration:none;
          font-family:'Russo One',sans-serif; font-size:0.85rem; }
  .tip { color:var(--muted); font-size:0.78rem; margin-top:10px; text-align:center; }
</style>
</head>
<body>
<a href="/" class="back">← BACK</a>
<h1>ALI POP</h1>
<div class="sub">Pop the Ali balloons before they escape!</div>
<div class="hud">
  <span>SCORE: <b id="score">0</b></span>
  <span>MISSED: <b id="missed">0/10</b></span>
  <span>COMBO: <b id="combo">x1</b></span>
</div>
<canvas id="c" width="720" height="520"></canvas>
<button class="btn" id="start">START</button>
<div class="tip">Click / tap the Ali balloons &bull; Don't let 10 escape</div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  var aliImg = new Image();
  aliImg.src = '/ali.jpg';

  var balloons = [];
  var particles = [];
  var score = 0, missed = 0, combo = 1, comboTimer = 0;
  var spawnTimer = 0;
  var running = false, gameOver = false;
  var timeElapsed = 0;

  function reset() {
    balloons = []; particles = [];
    score = 0; missed = 0; combo = 1; spawnTimer = 0; timeElapsed = 0;
    updateHUD();
    gameOver = false;
    running = true;
    document.getElementById('start').style.display = 'none';
  }

  function updateHUD() {
    document.getElementById('score').textContent = score;
    document.getElementById('missed').textContent = missed + '/10';
    document.getElementById('combo').textContent = 'x' + combo;
  }

  function spawnBalloon() {
    var speed = 1.2 + Math.min(timeElapsed / 20, 3);
    var r = 28 + Math.random() * 14;
    var kind = Math.random();
    var type = 'normal';
    if (kind < 0.1) type = 'gold';       // +25, big points
    else if (kind < 0.25) type = 'fast'; // moves 1.5x, +15
    balloons.push({
      x: 40 + Math.random() * (W - 80),
      y: H + r + 10,
      r: r,
      vy: -(speed + (type === 'fast' ? 2 : 0)),
      vx: (Math.random() - 0.5) * 0.6,
      type: type,
      pop: false,
      pulse: Math.random() * Math.PI * 2
    });
  }

  function spawnParticles(x, y, color, n) {
    for (var i=0;i<n;i++){
      particles.push({ x:x, y:y,
        vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8 - 2,
        life: 24, color: color });
    }
  }

  function update(dt) {
    timeElapsed += dt;
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnBalloon();
      spawnTimer = Math.max(0.35, 1.1 - timeElapsed * 0.02);
    }

    for (var i=balloons.length-1;i>=0;i--){
      var b = balloons[i];
      b.y += b.vy;
      b.x += b.vx;
      b.pulse += 0.1;
      if (b.x < b.r || b.x > W - b.r) b.vx *= -1;
      if (b.y < -b.r - 20) {
        balloons.splice(i, 1);
        missed++;
        combo = 1;
        updateHUD();
        if (missed >= 10) endGame();
      }
    }

    for (var j=particles.length-1;j>=0;j--){
      var p = particles[j];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.35;
      p.life--;
      if (p.life <= 0) particles.splice(j, 1);
    }

    comboTimer -= dt;
    if (comboTimer <= 0 && combo > 1) {
      combo = Math.max(1, combo - 1);
      updateHUD();
      comboTimer = 1.0;
    }
  }

  function endGame() {
    running = false;
    gameOver = true;
    document.getElementById('start').textContent = 'TRY AGAIN';
    document.getElementById('start').style.display = 'inline-block';
  }

  function draw() {
    ctx.fillStyle = '#0D0D1A';
    ctx.fillRect(0, 0, W, H);

    // grid
    ctx.strokeStyle = 'rgba(255,0,110,0.06)';
    ctx.lineWidth = 1;
    for (var x=0;x<W;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }

    // balloons
    for (var i=0;i<balloons.length;i++){
      var b = balloons[i];
      var wobble = Math.sin(b.pulse) * 2;
      var color = b.type === 'gold' ? '#FFD700' : (b.type === 'fast' ? '#FF006E' : '#00FFFF');

      // string
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y + b.r);
      ctx.quadraticCurveTo(b.x + wobble, b.y + b.r + 15, b.x + wobble * 2, b.y + b.r + 30);
      ctx.stroke();

      // balloon
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 14;
      var grad = ctx.createRadialGradient(b.x - b.r*0.3, b.y - b.r*0.3, 2, b.x, b.y, b.r);
      grad.addColorStop(0, color);
      grad.addColorStop(1, 'rgba(0,0,0,0.4)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, b.r, b.r * 1.1, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();

      // Ali face inside
      if (aliImg.complete && aliImg.naturalWidth) {
        var fs = b.r * 1.2;
        ctx.save();
        ctx.beginPath();
        ctx.arc(b.x, b.y, fs/2, 0, Math.PI*2);
        ctx.clip();
        ctx.drawImage(aliImg, b.x - fs/2, b.y - fs/2, fs, fs);
        ctx.restore();
        ctx.beginPath();
        ctx.arc(b.x, b.y, fs/2, 0, Math.PI*2);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      // highlight
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.ellipse(b.x - b.r*0.35, b.y - b.r*0.45, b.r*0.18, b.r*0.12, 0, 0, Math.PI*2);
      ctx.fill();
    }

    // particles
    for (var j=0;j<particles.length;j++){
      var p = particles[j];
      ctx.globalAlpha = p.life / 24;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  var lastTime = 0;
  function loop(t) {
    var dt = Math.min(0.033, (t - lastTime) / 1000);
    lastTime = t;
    if (running) update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function pop(x, y) {
    if (!running) return;
    for (var i=balloons.length-1;i>=0;i--){
      var b = balloons[i];
      var dx = x - b.x, dy = y - b.y;
      if (dx*dx + dy*dy <= b.r * b.r) {
        var pts = b.type === 'gold' ? 25 : (b.type === 'fast' ? 15 : 10);
        combo = Math.min(combo + 1, 10);
        comboTimer = 1.5;
        score += pts * combo;
        updateHUD();
        spawnParticles(b.x, b.y, b.type === 'gold' ? '#FFD700' : '#00FFFF', 14);
        balloons.splice(i, 1);
        return;
      }
    }
    // Missed click breaks combo
    combo = 1;
    updateHUD();
  }

  canvas.addEventListener('click', function(e){
    var rect = canvas.getBoundingClientRect();
    pop((e.clientX - rect.left) * (W/rect.width),
        (e.clientY - rect.top) * (H/rect.height));
  });
  canvas.addEventListener('touchstart', function(e){
    var rect = canvas.getBoundingClientRect();
    for (var i=0;i<e.touches.length;i++){
      pop((e.touches[i].clientX - rect.left) * (W/rect.width),
          (e.touches[i].clientY - rect.top) * (H/rect.height));
    }
    e.preventDefault();
  }, {passive:false});

  document.getElementById('start').addEventListener('click', reset);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
