<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Word</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0D0D1A; --panel:#141428; --cyan:#00FFFF; --pink:#FF006E; --purple:#7C3AED; --muted:#8a8aa8;
          --green:#2ecc71; --yellow:#FFD700; --gray:#3a3a4a; }
  *{box-sizing:border-box;}
  body { margin:0; background:var(--bg); color:#fff; font-family:'Chakra Petch',sans-serif;
         min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px;
         background-image: radial-gradient(circle at 50% 20%, rgba(46,204,113,0.08), transparent 50%); }
  h1 { font-family:'Russo One',sans-serif; color:var(--green); font-size:2.2rem;
       text-shadow:0 0 20px rgba(46,204,113,0.6); margin:8px 0 4px; letter-spacing:2px; }
  .sub { color:var(--muted); font-size:0.9rem; margin-bottom:14px; }
  .hud { display:flex; gap:24px; margin-bottom:10px; font-weight:700; font-size:1rem; }
  .hud b { color:var(--cyan); }
  .grid { display:grid; gap:6px; grid-template-rows:repeat(6, 56px); margin-bottom:20px; }
  .row { display:grid; grid-template-columns:repeat(5, 56px); gap:6px; }
  .tile { width:56px; height:56px; border:2px solid #333;
          font-family:'Russo One',sans-serif; font-size:1.5rem; color:#fff;
          display:flex; align-items:center; justify-content:center; text-transform:uppercase;
          background:transparent; transition:transform 0.2s, background 0.3s;
          letter-spacing:2px; }
  .tile.filled { border-color:#666; transform:scale(1.04); }
  .tile.green { background:var(--green); border-color:var(--green); box-shadow:0 0 10px rgba(46,204,113,0.5); }
  .tile.yellow { background:var(--yellow); color:#000; border-color:var(--yellow); box-shadow:0 0 10px rgba(255,215,0,0.5); }
  .tile.gray { background:var(--gray); border-color:var(--gray); }
  .keyboard { display:flex; flex-direction:column; gap:6px; }
  .kb-row { display:flex; gap:4px; justify-content:center; }
  .key { background:#3a3a55; color:#fff; border:none; padding:14px 10px; min-width:32px;
         font-family:'Russo One',sans-serif; font-size:0.85rem; border-radius:5px; cursor:pointer;
         text-transform:uppercase; letter-spacing:1px; }
  .key.wide { padding:14px 18px; font-size:0.7rem; }
  .key.green { background:var(--green); }
  .key.yellow { background:var(--yellow); color:#000; }
  .key.gray { background:#1a1a2a; color:#666; }
  .key:hover { filter:brightness(1.2); }
  .msg { min-height:24px; font-family:'Russo One',sans-serif; letter-spacing:2px; margin-bottom:10px;
         color:var(--cyan); }
  .btn { font-family:'Russo One',sans-serif; background:linear-gradient(135deg,var(--green),var(--cyan));
         border:none; color:#111; padding:9px 22px; border-radius:8px; font-size:0.9rem;
         letter-spacing:1px; cursor:pointer; box-shadow:0 0 14px rgba(46,204,113,0.3); margin-top:14px; font-weight:700; }
  .back { position:fixed; top:12px; left:12px; background:var(--panel); border:1px solid var(--cyan);
          color:var(--cyan); padding:6px 12px; border-radius:6px; text-decoration:none;
          font-family:'Russo One',sans-serif; font-size:0.85rem; }
  .tip { color:var(--muted); font-size:0.78rem; margin-top:10px; text-align:center; max-width:520px; }
  .ali-side { width:80px; height:80px; border-radius:50%;
              background:url('/ali.jpg') center/cover no-repeat;
              border:3px solid var(--green); box-shadow:0 0 18px rgba(46,204,113,0.5);
              position:fixed; top:20px; right:20px; }
</style>
</head>
<body>
<a href="/" class="back">← BACK</a>
<div class="ali-side"></div>
<h1>ALI WORD</h1>
<div class="sub">Guess the 5-letter Ali-themed word in 6 tries.</div>
<div class="hud">
  <span>STREAK: <b id="streak">0</b></span>
  <span>WINS: <b id="wins">0</b></span>
</div>
<div class="msg" id="msg">&nbsp;</div>
<div class="grid" id="grid"></div>
<div class="keyboard" id="kb"></div>
<button class="btn" id="newBtn">NEW WORD</button>
<div class="tip">Type letters &bull; ENTER to submit &bull; BACKSPACE to erase &bull; Green = right spot, Yellow = wrong spot</div>

<script>
(function(){
  // 5-letter words bank (Ali-themed + common)
  var WORDS = [
    'craft','brick','jumps','snake','slash','dashy','bombs','arena','tower','mines',
    'block','flame','grass','stone','field','plays','games','laser','spiky','neony',
    'ninja','heros','swift','quick','cubes','prism','glove','crown','spike','shoot',
    'beats','vibes','squad','catch','dodge','blast','flash','smoke','knife','radar',
    'punch','kicks','ramps','round','fight','bonus','combo','score','party','clash',
    'might','glory','quest','realm','magic','build','craft','climb','speed','quake',
    'flame','frost','shock','blaze','pluck','craze','clean','cloud','crisp','crisp',
    'water','earth','plant','color','green','blues','golds','pinks','grids','beats',
    'craft','rocky','sandy','cloud','stars','blast','wires','beams','glide','sneak'
  ];
  // De-duplicate + filter to 5 letters
  var bank = {};
  WORDS.forEach(function(w){ if (w.length === 5) bank[w] = true; });
  var WORD_BANK = Object.keys(bank);

  var grid = document.getElementById('grid');
  var kb = document.getElementById('kb');
  var msgEl = document.getElementById('msg');
  var streakEl = document.getElementById('streak');
  var winsEl = document.getElementById('wins');

  var streak = parseInt(localStorage.getItem('aliWordStreak')||'0', 10);
  var wins = parseInt(localStorage.getItem('aliWordWins')||'0', 10);
  streakEl.textContent = streak;
  winsEl.textContent = wins;

  var target = '';
  var guesses = [];
  var current = '';
  var done = false;
  var keyState = {}; // letter -> 'green'|'yellow'|'gray'

  function newGame() {
    target = WORD_BANK[Math.floor(Math.random() * WORD_BANK.length)];
    guesses = [];
    current = '';
    done = false;
    keyState = {};
    msgEl.textContent = '';
    msgEl.style.color = '';
    render();
    renderKeyboard();
  }

  function render() {
    while (grid.firstChild) grid.removeChild(grid.firstChild);
    for (var r = 0; r < 6; r++) {
      var row = document.createElement('div');
      row.className = 'row';
      var word = guesses[r] || (r === guesses.length ? current : '');
      var feedback = guesses[r] ? evaluate(guesses[r]) : null;
      for (var i = 0; i < 5; i++) {
        var t = document.createElement('div');
        t.className = 'tile';
        if (word[i]) { t.textContent = word[i]; t.classList.add('filled'); }
        if (feedback) t.classList.add(feedback[i]);
        row.appendChild(t);
      }
      grid.appendChild(row);
    }
  }

  function renderKeyboard() {
    while (kb.firstChild) kb.removeChild(kb.firstChild);
    var rows = ['qwertyuiop','asdfghjkl','zxcvbnm'];
    rows.forEach(function(r, ridx){
      var rowEl = document.createElement('div');
      rowEl.className = 'kb-row';
      if (ridx === 2) {
        var enter = document.createElement('button');
        enter.className = 'key wide';
        enter.textContent = 'ENTER';
        enter.addEventListener('click', submit);
        rowEl.appendChild(enter);
      }
      for (var i = 0; i < r.length; i++) {
        (function(letter){
          var b = document.createElement('button');
          b.className = 'key' + (keyState[letter] ? ' ' + keyState[letter] : '');
          b.textContent = letter;
          b.addEventListener('click', function(){ press(letter); });
          rowEl.appendChild(b);
        })(r[i]);
      }
      if (ridx === 2) {
        var bksp = document.createElement('button');
        bksp.className = 'key wide';
        bksp.textContent = '⌫';
        bksp.addEventListener('click', function(){ backspace(); });
        rowEl.appendChild(bksp);
      }
      kb.appendChild(rowEl);
    });
  }

  function evaluate(word) {
    var fb = ['gray','gray','gray','gray','gray'];
    var t = target.split('');
    // First pass: green
    for (var i = 0; i < 5; i++) {
      if (word[i] === t[i]) { fb[i] = 'green'; t[i] = null; }
    }
    // Second: yellow
    for (var j = 0; j < 5; j++) {
      if (fb[j] === 'green') continue;
      var idx = t.indexOf(word[j]);
      if (idx !== -1) { fb[j] = 'yellow'; t[idx] = null; }
    }
    return fb;
  }

  function press(l) {
    if (done) return;
    if (current.length >= 5) return;
    current += l.toLowerCase();
    render();
  }
  function backspace() {
    if (done) return;
    current = current.slice(0, -1);
    render();
  }
  function submit() {
    if (done) return;
    if (current.length !== 5) { flash('5 letters'); return; }
    guesses.push(current);
    var fb = evaluate(current);
    // Update key state
    for (var i = 0; i < 5; i++) {
      var l = current[i];
      var st = fb[i];
      var cur = keyState[l];
      if (st === 'green') keyState[l] = 'green';
      else if (st === 'yellow' && cur !== 'green') keyState[l] = 'yellow';
      else if (st === 'gray' && !cur) keyState[l] = 'gray';
    }
    if (current === target) {
      done = true;
      msgEl.textContent = 'GOT IT — ' + target.toUpperCase() + ' (' + guesses.length + '/6)';
      msgEl.style.color = '#2ecc71';
      streak++; wins++;
      localStorage.setItem('aliWordStreak', String(streak));
      localStorage.setItem('aliWordWins', String(wins));
      streakEl.textContent = streak; winsEl.textContent = wins;
    } else if (guesses.length >= 6) {
      done = true;
      msgEl.textContent = 'WORD WAS: ' + target.toUpperCase();
      msgEl.style.color = '#FF006E';
      streak = 0;
      localStorage.setItem('aliWordStreak', '0');
      streakEl.textContent = '0';
    }
    current = '';
    render();
    renderKeyboard();
  }
  function flash(t) {
    msgEl.textContent = t;
    msgEl.style.color = '#FFD700';
    setTimeout(function(){ if (!done) { msgEl.textContent = ''; msgEl.style.color = ''; } }, 1200);
  }

  document.addEventListener('keydown', function(e){
    if (done) return;
    var k = e.key;
    if (k === 'Enter') { submit(); e.preventDefault(); }
    else if (k === 'Backspace') { backspace(); e.preventDefault(); }
    else if (/^[a-zA-Z]$/.test(k)) { press(k); }
  });
  document.getElementById('newBtn').addEventListener('click', newGame);

  newGame();
})();
</script>
</body>
</html>
